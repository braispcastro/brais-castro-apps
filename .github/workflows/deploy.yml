name: Refresh iTunes data

on:
  schedule:
    # Every Monday at 06:00 UTC — refreshes app data from iTunes API
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy
        run: curl -X POST "${{ secrets.CF_DEPLOY_HOOK }}"
